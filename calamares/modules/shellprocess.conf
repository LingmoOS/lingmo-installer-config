---
dontChroot: true
timeout: 600
script:
    - command: |
        if [ ! -f /tmp/.full-install ]; then exit 0; fi
        FULL_SFS="/run/live/medium/live/full.squashfs"
        MNT="/tmp/full-squash-$$"
        mkdir -p "$MNT"
        mount -o loop "$FULL_SFS" "$MNT" || exit 1
        if [ -d "$MNT/system/EXTRA_PKGS" ]; then
            mkdir -p "${ROOT}/tmp/extra-pkgs"
            cp -r "$MNT/system/EXTRA_PKGS/"* "${ROOT}/tmp/extra-pkgs/"
            chroot "${ROOT}" bash -c 'dpkg -i /tmp/extra-pkgs/*.deb 2>/dev/null; apt-get install -f -y -q'
            rm -rf "${ROOT}/tmp/extra-pkgs"
        fi
        umount "$MNT" 2>/dev/null || true
        rmdir "$MNT" 2>/dev/null || true
        rm -f /tmp/.full-install
